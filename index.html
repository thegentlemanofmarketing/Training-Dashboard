    <style>
        /* Custom Scrollbar for a premium look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #222222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a98a66; }
        
        /* Basic animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideRight { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        .animate-slide-right { animation: slideRight 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#000000] text-white font-sans selection:bg-[#a98a66] selection:text-black">

        const MessageSquare = (p) => <IconBase {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></IconBase>;

        function App() {
          const [activeTab, setActiveTab] = useState('home');
          const [activeDayCore, setActiveDayCore] = useState(1);
          const [activeDayPrivate, setActiveDayPrivate] = useState(1);
          const [activeScriptTab, setActiveScriptTab] = useState('mortgage');
          const [copiedId, setCopiedId] = useState(null);

          const copyToClipboard = (text, id) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              setCopiedId(id);
              setTimeout(() => setCopiedId(null), 2000);
            } catch (err) {
              console.error('Failed to copy', err);
            }
            document.body.removeChild(textArea);
          };

          const renderNavButton = (id, icon, label) => (
            <button
              onClick={() => setActiveTab(id)}
              className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200 ${
                activeTab === id 
                  ? 'bg-[#a98a66] text-black font-semibold shadow-[0_0_15px_rgba(169,138,102,0.3)]' 
                  : 'text-gray-400 hover:bg-[#1a1a1a] hover:text-white'
              }`}
            >
              {icon}
              <span>{label}</span>
            </button>
          );

          return (
            <div className="min-h-screen flex flex-col md:flex-row">
              
              {/* SIDEBAR */}
              <div className="w-full md:w-72 bg-[#111111] border-r border-[#222222] p-6 flex flex-col flex-shrink-0">
                <div className="mb-10 text-center md:text-left">
                  <h1 className="text-2xl font-serif text-[#a98a66] tracking-wider font-bold mb-2">THE GENTLEMAN</h1>

                  <div className="h-[1px] w-full bg-gradient-to-r from-[#a98a66]/50 to-transparent mt-6"></div>
                </div>

                  {renderNavButton('home', <LayoutDashboard size={20} />, 'The Attaché Overview')}
                  {renderNavButton('core', <BookOpen size={20} />, 'Core 7-Day Playbook')}
                  {renderNavButton('private', <Briefcase size={20} />, 'Private Client Playbook')}

                {/* HOME VIEW */}
                {activeTab === 'home' && (
                  <div className="max-w-4xl mx-auto p-4 md:p-12 animate-fade-in animate-slide-up">
                    <h2 className="text-4xl font-serif text-[#a98a66] mb-4">Welcome to The Gentleman Of Marketing.</h2>
                    <p className="text-xl text-gray-300 leading-relaxed mb-12 border-l-2 border-[#a98a66] pl-6 py-2 bg-[#111111]/50 rounded-r-lg">
                      You were not hired to "hustle." You were not hired to cold call strangers and beg for their business. We do not operate in the pursuit model. Your job is to act as the architect of a system that generates "yes" responses. We sell a $2,000/month proprietary system called the <strong>Precision Engine</strong>, and we do it with absolute dignity.
                    </p>

                    <div className="grid md:grid-cols-3 gap-6">
                      <div className="bg-[#111111] border border-[#222222] p-6 rounded-xl hover:border-[#a98a66]/50 transition-colors">
                        <Target color={BRAND.gold} size={32} className="mb-4" />
                        <h3 className="text-lg font-semibold text-white mb-2">The Anti-Sales Philosophy</h3>
                        <p className="text-gray-400 text-sm">Resort to high-pressure tactics, and you destroy our brand's dignity. Act as a Consultant, not a solicitor.</p>
                      </div>
                      <div className="bg-[#111111] border border-[#222222] p-6 rounded-xl hover:border-[#a98a66]/50 transition-colors">
                        <ShieldCheck color={BRAND.gold} size={32} className="mb-4" />
                        <h3 className="text-lg font-semibold text-white mb-2">The Precision Engine</h3>
                        <p className="text-gray-400 text-sm">We don't sell 'marketing'. We build digital infrastructure for professional practices to stop losing high-value clients.</p>
                      </div>
                      <div className="bg-[#111111] border border-[#222222] p-6 rounded-xl hover:border-[#a98a66]/50 transition-colors">
                        <Award color={BRAND.gold} size={32} className="mb-4" />
                        <h3 className="text-lg font-semibold text-white mb-2">The Gentle Approach</h3>
                        <p className="text-gray-400 text-sm">We do not ask for their time; we deliver upfront value through Stealth Audits and frictionless asynchronous handoffs.</p>
                      </div>
                    </div>

                    <button 
                      onClick={() => setActiveTab('core')}
                      className="mt-12 group flex items-center gap-3 bg-[#a98a66] text-black px-8 py-4 rounded-lg font-bold hover:bg-[#bfa381] transition-all"
                    >
                      Initialize 7-Day Protocol
                      <ChevronRight className="group-hover:translate-x-1 transition-transform" />
                    </button>
                  </div>
                )}

                {/* CORE PLAYBOOK VIEW */}
                {activeTab === 'core' && (
                  <div className="max-w-5xl mx-auto p-4 md:p-12 animate-fade-in h-full flex flex-col">
                    <div className="mb-8">
                      <h2 className="text-3xl font-serif text-[#a98a66] mb-2">Core Acquisition: 7-Day Playbook</h2>
                      <p className="text-gray-400">Targeting: Law Firms, Mortgage Brokers, Dentists, High-Ticket Home Services.</p>
                    </div>

                    <div className="flex flex-col md:flex-row gap-8 flex-1">
                      {/* Day Selector */}
                      <div className="w-full md:w-1/3 flex flex-col gap-3">
                        {CORE_PLAYBOOK.map((day) => (
                          <button
                            key={day.day}
                            onClick={() => setActiveDayCore(day.day)}
                            className={`text-left p-4 rounded-xl border transition-all flex items-center justify-between group ${
                              activeDayCore === day.day 
                                ? 'bg-[#111111] border-[#a98a66] shadow-[0_0_10px_rgba(169,138,102,0.1)]' 
                                : 'bg-[#0a0a0a] border-[#222222] hover:border-[#444444]'
                            }`}
                          >
                            <div>
                              <span className={`text-xs font-bold tracking-widest uppercase block mb-1 ${activeDayCore === day.day ? 'text-[#a98a66]' : 'text-gray-500'}`}>Day {day.day}</span>
                              <span className={`font-semibold ${activeDayCore === day.day ? 'text-white' : 'text-gray-300'}`}>{day.title}</span>
                            </div>
                            <div className={`${activeDayCore === day.day ? 'text-[#a98a66]' : 'text-gray-600 opacity-0 group-hover:opacity-100'} transition-all`}>
                                <ChevronRight size={18} />
                            </div>
                          </button>
                        ))}
                      </div>

                      {/* Day Content */}
                      <div className="w-full md:w-2/3 bg-[#111111] border border-[#222222] rounded-xl p-6 md:p-8 shadow-xl">
                        {CORE_PLAYBOOK.filter(d => d.day === activeDayCore).map(active => (
                          <div key={active.day} className="animate-slide-right animate-fade-in">
                            <div className="flex items-center gap-4 mb-6 pb-6 border-b border-[#222222]">
                              <div className="bg-[#1a1a1a] p-3 rounded-lg border border-[#a98a66]/30">
                                {active.icon}
                              </div>
                              <div>
                                <h3 className="text-xl md:text-2xl font-serif text-white">{active.title}</h3>
                                <p className="text-[#a98a66] text-sm uppercase tracking-wider font-bold mt-1">Day {active.day} Objectives</p>
                              </div>
                            </div>
                            
                            <div className="space-y-6">
                              {active.content.map((block, idx) => (
                                <div key={idx} className="bg-[#0a0a0a] p-5 rounded-lg border border-[#1a1a1a] relative group">
                                  {block.text && (
                                    <button 
                                      onClick={() => copyToClipboard(block.text, `core-${active.day}-${idx}`)}
                                      className="absolute top-4 right-4 text-gray-500 hover:text-[#a98a66] bg-[#111111] p-2 rounded-md transition-colors opacity-100 md:opacity-0 md:group-hover:opacity-100"
                                      title="Copy to clipboard"
                                    >
                                      {copiedId === `core-${active.day}-${idx}` ? <CheckCircle size={16} color="#22c55e" /> : <Copy size={16} />}
                                    </button>
                                  )}
                                  <h4 className="text-[#a98a66] font-semibold mb-2 flex items-center gap-2">
                                    {block.subtitle}
                                  </h4>
                                  {block.text && <p className="text-gray-300 whitespace-pre-wrap leading-relaxed pr-8">{block.text}</p>}
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* PRIVATE PLAYBOOK VIEW */}
                {activeTab === 'private' && (
                  <div className="max-w-5xl mx-auto p-4 md:p-12 animate-fade-in h-full flex flex-col">
                    <div className="mb-8">
                      <h2 className="text-3xl font-serif text-[#a98a66] mb-2">Private Client Playbook</h2>
                      <p className="text-gray-400">Targeting: Plumbers, Accountants, Gyms, Med Spas, Auto Repair (The Local Wild West).</p>
                    </div>

                    <div className="flex flex-col md:flex-row gap-8 flex-1">
                      {/* Day Selector */}
                      <div className="w-full md:w-1/3 flex flex-col gap-3">
                        {PRIVATE_PLAYBOOK.map((day) => (
                          <button
                            key={day.day}
                            onClick={() => setActiveDayPrivate(day.day)}
                            className={`text-left p-4 rounded-xl border transition-all flex items-center justify-between group ${
                              activeDayPrivate === day.day 
                                ? 'bg-[#111111] border-[#a98a66] shadow-[0_0_10px_rgba(169,138,102,0.1)]' 
                                : 'bg-[#0a0a0a] border-[#222222] hover:border-[#444444]'
                            }`}
                          >
                            <div>
                              <span className={`text-xs font-bold tracking-widest uppercase block mb-1 ${activeDayPrivate === day.day ? 'text-[#a98a66]' : 'text-gray-500'}`}>Day {day.day}</span>
                              <span className={`font-semibold ${activeDayPrivate === day.day ? 'text-white' : 'text-gray-300'}`}>{day.title}</span>
                            </div>
                            <div className={`${activeDayPrivate === day.day ? 'text-[#a98a66]' : 'text-gray-600 opacity-0 group-hover:opacity-100'} transition-all`}>
                                <ChevronRight size={18} />
                            </div>
                          </button>
                        ))}
                      </div>

                      {/* Day Content */}
                      <div className="w-full md:w-2/3 bg-[#111111] border border-[#222222] rounded-xl p-6 md:p-8 shadow-xl">
                        {PRIVATE_PLAYBOOK.filter(d => d.day === activeDayPrivate).map(active => (
                          <div key={active.day} className="animate-slide-right animate-fade-in">
                            <div className="flex items-center gap-4 mb-6 pb-6 border-b border-[#222222]">
                              <div className="bg-[#1a1a1a] p-3 rounded-lg border border-[#a98a66]/30">
                                {active.icon}
                              </div>
                              <div>
                                <h3 className="text-xl md:text-2xl font-serif text-white">{active.title}</h3>
                                <p className="text-[#a98a66] text-sm uppercase tracking-wider font-bold mt-1">Day {active.day} Objectives</p>
                              </div>
                            </div>
                            
                            <div className="space-y-6">
                              {active.content.map((block, idx) => (
                                <div key={idx} className="bg-[#0a0a0a] p-5 rounded-lg border border-[#1a1a1a] relative group">
                                  {block.text && (
                                    <button 
                                      onClick={() => copyToClipboard(block.text, `private-${active.day}-${idx}`)}
                                      className="absolute top-4 right-4 text-gray-500 hover:text-[#a98a66] bg-[#111111] p-2 rounded-md transition-colors opacity-100 md:opacity-0 md:group-hover:opacity-100"
                                      title="Copy to clipboard"
                                    >
                                      {copiedId === `private-${active.day}-${idx}` ? <CheckCircle size={16} color="#22c55e" /> : <Copy size={16} />}
                                    </button>
                                  )}
                                  <h4 className="text-[#a98a66] font-semibold mb-2 flex items-center gap-2">
                                    {block.subtitle}
                                  </h4>
                                  {block.text && <p className="text-gray-300 whitespace-pre-wrap leading-relaxed pr-8">{block.text}</p>}
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* SCRIPTS VIEW */}
                {activeTab === 'scripts' && (
                  <div className="max-w-5xl mx-auto p-4 md:p-12 animate-fade-in">
                    <div className="mb-8">
                      <h2 className="text-3xl font-serif text-[#a98a66] mb-2">Tailored Marketing Scripts</h2>
                      <p className="text-gray-400">Pre-built, frictionless asynchronous video scripts (Loom) for core verticals.</p>
                    </div>

                    {/* Script Tabs */}
                    <div className="flex flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-2 mb-8 bg-[#111111] p-2 rounded-xl border border-[#222222] overflow-x-auto">
                      {SCRIPTS.map(script => (
                        <button
                          key={script.id}
                          onClick={() => setActiveScriptTab(script.id)}
                          className={`flex-1 py-3 px-6 rounded-lg font-semibold transition-all whitespace-nowrap text-center ${
                            activeScriptTab === script.id 
                              ? 'bg-[#a98a66] text-black shadow-md' 
                              : 'text-gray-400 hover:text-white hover:bg-[#1a1a1a]'
                          }`}
                        >
                          {script.title}
                        </button>
                      ))}
                    </div>

                    {/* Script Content */}
                    {SCRIPTS.filter(s => s.id === activeScriptTab).map(activeScript => (
                      <div key={activeScript.id} className="bg-[#111111] border border-[#222222] rounded-xl shadow-xl overflow-hidden animate-slide-up animate-fade-in">
                        
                        <div className="bg-[#1a1a1a] p-6 border-b border-[#333333] flex flex-col md:flex-row justify-between md:items-center gap-4">
                          <div>
                            <span className="text-xs uppercase tracking-widest text-gray-500 block mb-1">Target Audience</span>
                            <h3 className="text-xl font-serif text-white">{activeScript.title}</h3>
                          </div>
                          <div className="md:text-right">
                            <span className="text-xs uppercase tracking-widest text-[#a98a66] block mb-1">The Hero's Desire</span>
                            <p className="text-sm text-gray-300">{activeScript.heroDesire}</p>
                          </div>
                        </div>

                        <div className="p-6 md:p-8 space-y-8">
                          {activeScript.sections.map((section, idx) => (
                            <div key={idx} className="relative group">
                              <div className="flex flex-col md:flex-row justify-between md:items-center mb-3 gap-2">
                                <h4 className="text-[#a98a66] font-bold">{section.time}</h4>
                                <button 
                                  onClick={() => copyToClipboard(section.text, `script-${activeScript.id}-${idx}`)}
                                  className="flex items-center gap-2 text-xs text-gray-400 hover:text-[#a98a66] transition-colors self-start md:self-auto"
                                >
                                  {copiedId === `script-${activeScript.id}-${idx}` ? (
                                    <><CheckCircle size={14} color="#22c55e" /> Copied</>
                                  ) : (
                                    <><Copy size={14} /> Copy Section</>
                                  )}
                                </button>
                              </div>
                              
                              <div className="bg-[#0a0a0a] p-6 rounded-lg border border-[#222222] group-hover:border-[#a98a66]/30 transition-colors">
                                {section.visual && (
                                  <div className="mb-4 pb-4 border-b border-[#222222]/50 text-xs text-[#a98a66] flex items-center gap-2">
                                    <PlayCircle size={14} />
                                    <span className="italic">{section.visual}</span>
                                  </div>
                                )}
                                <p className="text-gray-300 leading-relaxed italic border-l-2 border-[#333333] pl-4">"{section.text}"</p>
                              </div>
                            </div>
                          ))}
                          
                          {/* Full copy button */}
                          <div className="pt-6 border-t border-[#222222] flex justify-end">
                            <button 
                              onClick={() => copyToClipboard(activeScript.sections.map(s => s.text).join('\n\n'), `script-${activeScript.id}-full`)}
                              className="bg-[#1a1a1a] hover:bg-[#222222] border border-[#333333] text-white px-6 py-3 rounded-lg flex items-center gap-2 transition-all font-semibold w-full md:w-auto justify-center"
                            >
                              {copiedId === `script-${activeScript.id}-full` ? <CheckCircle size={18} color="#22c55e"/> : <Copy size={18}/>}
                              {copiedId === `script-${activeScript.id}-full` ? 'Full Script Copied!' : 'Copy Entire Script'}
                            </button>
                          </div>
                        </div>
                      </div>
                    ))}

                    {/* Tactical Review Board */}
                    <div className="mt-12 bg-gradient-to-br from-[#111111] to-[#0a0a0a] border border-[#a98a66]/20 rounded-xl p-6 md:p-8 relative overflow-hidden">
                      <div className="absolute top-0 right-0 w-64 h-64 bg-[#a98a66] opacity-5 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
                      
                      <h3 className="text-xl font-serif text-[#a98a66] mb-6 flex items-center gap-3">
                        <Target size={24} />
                        The Board's Tactical Review
                      </h3>
                      
                      <div className="grid md:grid-cols-3 gap-6 relative z-10">
                        <div className="border-l border-[#333333] pl-4">
                          <p className="text-white font-bold mb-1">Peter Thiel <span className="text-gray-500 font-normal text-sm block">The Monopolist</span></p>
                          <p className="text-sm text-gray-400 italic">"By creating specific verticals, you achieve micro-monopolies. When a dentist sees a calendar full of implant consults, they assume you possess a proprietary 'Dental Secret'. You eliminate competition simply by speaking their language."</p>
                        </div>
                        <div className="border-l border-[#333333] pl-4">
                          <p className="text-white font-bold mb-1">Al Ries <span className="text-gray-500 font-normal text-sm block">The General</span></p>
                          <p className="text-sm text-gray-400 italic">"This is perfect positioning. The lawyer gets the 'Retainer' script. The Mortgage broker gets the 'Funded Loan' script. You are owning the specific word inside each prospect's mind. Do not mix them up."</p>
                        </div>
                        <div className="border-l border-[#333333] pl-4">
                          <p className="text-white font-bold mb-1">Donald Miller <span className="text-gray-500 font-normal text-sm block">The Guide</span></p>
                          <p className="text-sm text-gray-400 italic">"Notice how we identified the specific 'Villain' for that industry. For mortgage, it's Zillow tire-kickers. For law, free-advice seekers. When you name their specific villain, they trust you immediately as the Guide."</p>
                        </div>
                      </div>
                    </div>

                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
